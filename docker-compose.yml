services:
  api:
    build: ./backend
    container_name: ironvipers_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+psycopg://ironvipers:ironvipers_password@db:5432/iron_vipers_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  db:
    image: postgres:16
    container_name: ironvipers_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: iron_vipers_db
      POSTGRES_USER: ironvipers
      POSTGRES_PASSWORD: ironvipers_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironvipers -d iron_vipers_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: ironvipers_pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ironvipers.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db

volumes:
  postgres_data:
